# Olympus Ground Station — Docker Compose
#   docker compose run --rm gs gui
#   docker compose run --rm gs capture 172.21.255.241 30
#   docker compose run --rm gs client  172.21.255.241 --auto 10
#
# VNC variant (works on Docker Desktop / macOS / Windows — no host X server):
#   docker compose --profile vnc up gsvnc
#   then open http://localhost:8080/vnc.html  (VNC password: olympus)

services:
  gs:
    build:
      context: ..
      dockerfile: ground_station/Dockerfile
    image: olympus-gs:latest
    container_name: olympus-gs
    network_mode: host            # reach the Pi over LAN; reuse SSH agent
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      QT_QPA_PLATFORM: xcb
      XAUTHORITY: /tmp/.docker.xauth
      SSH_AUTH_SOCK: "/ssh-agent"
      HOME: /root
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ./logs:/app/logs
      - ./evidencia_tesis:/app/evidencia_tesis
      - "${HOME}/.ssh:/root/.ssh:ro"
      - "${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent"
    command: gui

  gsvnc:
    build:
      context: ..
      dockerfile: ground_station/Dockerfile.vnc
    image: olympus-gs-vnc:latest
    container_name: olympus-gs-vnc
    ports:
      - "8080:8080"   # noVNC web client
      - "5900:5900"   # raw VNC (optional)
    environment:
      RESOLUTION: "${GS_RESOLUTION:-1920x1080x24}"
      VNC_PASSWORD: "${GS_VNC_PASSWORD:-olympus}"
      NOVNC_PORT: "8080"
    volumes:
      - ./logs:/app/logs
      - ./evidencia_tesis:/app/evidencia_tesis
      - "${HOME}/.ssh:/root/.ssh:ro"
    command: gui
    profiles: ["vnc"]