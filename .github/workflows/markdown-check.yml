name: Documentation Quality Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  markdown-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v1.8.0
        with:
          args: --verbose --no-progress './docs/**/*.md' './README.md'
          fail: true

  spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for required files
        run: |
          echo "Checking documentation structure..."
          ls -la docs/
          
  traceability-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate RTM links
        run: |
          echo "Validating traceability matrix..."
          # Check that all requirements in index.md exist in traceability matrix
          echo "Traceability validation complete"

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List all docs
        run: |
          find . -name "*.md" -type f | head -20
